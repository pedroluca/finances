<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo-branca.png" />
    <!-- <link rel="icon" type="image/x-icon" href="/favicon.ico" /> -->
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json?v=2" />
    
    <!-- Meta tags para mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finances" />
    
    <!-- Theme color -->
    <meta name="theme-color" content="#1f2937" />

    <!-- Aplica o tema ANTES do React montar para evitar flash branco -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          // Padrão: dark. Só muda para light se explicitamente salvo.
          if (saved === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    
    <!-- Descrição -->
    <meta name="description" content="Seu dashboard de controle de faturas" />
    
    <title>Finances | Gerenciador de faturas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
